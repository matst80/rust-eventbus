apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawler-web
  labels:
    app: crawler-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawler-web
  template:
    metadata:
      labels:
        app: crawler-web
    spec:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: crawler-web
        image: matst80/rust-eventbus:latest
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
        ports:
        - name: http
          containerPort: 3000
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:hySsuz-gujde4-goxges@postgres:5432/iamu"
        - name: PORT
          value: "3000"
        - name: HOST
          value: "0.0.0.0"
        - name: RUST_LOG
          value: "info,chromiumoxide=error"
        - name: MAX_CHUNKS
          value: "100"
        - name: CHROME_USER_DATA_DIR
          value: "/tmp/chrome-profile"
        - name: CPU_ONLY
          value: "true"
        - name: EMBEDDING_QUEUE_CAPACITY
          value: "32"
        - name: EMBEDDING_BATCH_SIZE
          value: "1"
        - name: BUS_CAPACITY
          value: "128"
        - name: PERSISTENCE_CONCURRENCY
          value: "2"
        resources:
          limits:
            memory: "12Gi"
          requests:
            memory: "512Mi"
            cpu: "200m"
        volumeMounts:
        - name: model-data
          mountPath: /app/data
        - name: tmp-data
          mountPath: /tmp
        - name: dshm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: model-data
        persistentVolumeClaim:
          claimName: crawler-model-pvc
      - name: tmp-data
        emptyDir: {}
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: crawler-web-service
spec:
  selector:
    app: crawler-web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crawler-model-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client # matches previous config
  resources:
    requests:
      storage: 5Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crawler-web-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - crawler.k6n.net # Updated domain placeholder or keep previous? user had todo.k6n.net
    secretName: crawler-web-tls
  rules:
  - host: crawler.k6n.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: crawler-web-service
            port:
              number: 80
